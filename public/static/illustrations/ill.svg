<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style type="text/css">
      /* --- STYLES DES ACTIVITÉS (NOIR) --- */
      /* Fond blanc, bordure rouge (conservée du thème précédent) */
      .node-rect { fill: #ffffff; stroke: #c0392b; stroke-width: 2; rx: 10; ry: 10; }
      /* Texte principal en NOIR PUR */
      .node-text { font-family: Arial, sans-serif; font-size: 14px; fill: #000000; text-anchor: middle; alignment-baseline: middle; }
      /* Titres en NOIR PUR et gras */
      .node-title { font-weight: bold; fill: #000000; }

      /* --- STYLES DES CONNECTEURS (ROUGE) --- */
      /* Connecteurs (flèches) restent en rouge vif */
      .connector { fill: none; stroke: #e74c3c; stroke-width: 3; marker-end: url(#arrowhead); }

      /* --- STYLE DE L'ÉLÉMENT CENTRAL (ROUGE) --- */
      /* Cercle central avec bordure rouge vif plus épaisse */
      .center-circle { fill: #fdf2f2; stroke: #e74c3c; stroke-width: 5; }
      /* Texte central en ROUGE VIF */
      .center-text { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; fill: #e74c3c; text-anchor: middle; }
    </style>
    
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c" />
    </marker>
  </defs>

  <circle cx="400" cy="400" r="75" class="center-circle" />
  <text x="400" y="400" class="center-text">
    <tspan x="400" dy="-0.5em">CYCLE DU</tspan>
    <tspan x="400" dy="1.2em">PROCESSUS</tspan>
  </text>

  <path d="M 400,120 A 280,280 0 0,1 642.5,220" class="connector"/> <path d="M 642.5,220 A 280,280 0 0,1 750,400" class="connector"/> <path d="M 750,400 A 280,280 0 0,1 642.5,580" class="connector"/> <path d="M 642.5,580 A 280,280 0 0,1 400,680" class="connector"/> <path d="M 400,680 A 280,280 0 0,1 157.5,580" class="connector"/> <path d="M 157.5,580 A 280,280 0 0,1 50,400" class="connector"/>   <path d="M 50,400 A 280,280 0 0,1 157.5,220" class="connector"/>  <path d="M 157.5,220 A 280,280 0 0,1 385,120" class="connector"/> <g transform="translate(400, 100)">
    <rect x="-100" y="-30" width="200" height="60" class="node-rect"/>
    <text class="node-text node-title">1. Etude de base</text>
  </g>

  <g transform="translate(642.5, 200)">
    <rect x="-100" y="-30" width="200" height="60" class="node-rect"/>
    <text class="node-text node-title">2. Sélection des acteurs</text>
  </g>

  <g transform="translate(750, 400)">
    <rect x="-100" y="-35" width="200" height="70" class="node-rect"/>
    <text y="0" class="node-text">
        <tspan x="0" dy="-0.5em" class="node-title">3. Certification</tspan>
        <tspan x="0" dy="1.2em">des concessions</tspan>
    </text>
  </g>

  <g transform="translate(642.5, 600)">
    <rect x="-100" y="-30" width="200" height="60" class="node-rect"/>
    <text class="node-text node-title">4. Gestion des plaintes</text>
  </g>

  <g transform="translate(400, 700)">
    <rect x="-80" y="-30" width="160" height="60" class="node-rect"/>
    <text class="node-text node-title">5. Plan S &amp; E</text>
  </g>

  <g transform="translate(157.5, 600)">
    <rect x="-120" y="-50" width="240" height="100" class="node-rect"/>
    <text y="-5" class="node-text">
      <tspan x="0" dy="-1.2em" class="node-title">6. Suivi et Evolution</tspan>
      <tspan x="0" dy="1.2em">des contrats de financement</tspan>
      <tspan x="0" dy="1.2em">basé sur le Résultat</tspan>
    </text>
  </g>

  <g transform="translate(50, 400)">
    <rect x="-110" y="-35" width="220" height="70" class="node-rect"/>
    <text y="0" class="node-text">
        <tspan x="0" dy="-0.5em" class="node-title">7. Suivi des performances</tspan>
        <tspan x="0" dy="1.2em">de plantations</tspan>
    </text>
  </g>

  <g transform="translate(157.5, 200)">
    <rect x="-80" y="-30" width="160" height="60" class="node-rect"/>
    <text class="node-text node-title">8. Rapports</text>
  </g>

</svg>